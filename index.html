<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Card</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; padding-top: 50px; }
        .card { box-shadow: 0 4px 8px 0 rgba(0,0,0,0.2); max-width: 300px; text-align: center; background: white; padding: 20px; border-radius: 10px; }
        .card img { width: 100px; height: 100px; border-radius: 50%; }
        .card h1 { font-size: 24px; margin: 10px 0; }
        .card p { color: grey; font-size: 16px; }
        .card a { text-decoration: none; color: black; margin: 0 5px; }
    </style>
</head>
<body>
    <div class="card">
        <img src="profile.jpg" alt="Profile Picture">
        <h1>Aiden</h1>
        <p>Bengaluru</p>
        <p>I am a Student in CSDS from DSCE</p>
    </div>
</body>
</html>
